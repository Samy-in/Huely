services:
  - type: web
    name: huely-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://huely-six.vercel.app
      - key: PYTHON_VERSION
        value: "3.11.0"
